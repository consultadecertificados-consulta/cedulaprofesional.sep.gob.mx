<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Búsqueda de Cédulas Profesionales | Registro Nacional de Profesionistas</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    
    <style>
        :root {
            --gob-guinda: #621132;
            --gob-oro: #9D843E;
            --gob-gris-fondo: #F2F2F2;
            --gob-gris-borde: #D9D9D9;
            --gob-texto-p: #6F7271;
            --gob-texto-negro: #4D4D4D;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #fff; color: #333; -webkit-font-smoothing: antialiased; overflow-x: hidden; width: 100%; }

        /* Barra Superior */
        .nav-gob { 
            background-color: var(--gob-guinda); 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky;
            top: 0;
            z-index: 1001;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-gob .logo-link img { height: 28px; display: block; }

        .menu-ham-trigger {
            color: white;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.8;
        }

        /* Menú Desplegable (Estilo de la foto) */
        .gob-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 0; /* Altura inicial */
            background-color: var(--gob-guinda);
            z-index: 2000;
            transition: height 0.4s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .gob-menu-overlay.active { height: 100vh; }

        .header-menu-open {
            width: 100%;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-options-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-top: -50px; /* Centrado visual */
        }

        .menu-link {
            color: white;
            text-decoration: none;
            font-size: 26px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .search-icon-large {
            color: white;
            font-size: 24px;
            margin-top: 10px;
        }

        .close-menu-btn {
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        /* Header Logo */
        .header-image-container { width: 100%; border-bottom: 6px solid var(--gob-oro); }
        .header-image-container img { width: 100%; height: auto; display: block; }

        main { width: 100%; max-width: 1100px; margin: 0 auto; padding: 15px; }
        .breadcrumb { padding: 10px 0 20px; font-size: 13px; color: #666; }
        .intro-container h2 { font-size: 24px; font-weight: 700; color: var(--gob-texto-negro); margin-bottom: 10px; line-height: 1.2; }
        .linea-oro { width: 40px; height: 4px; background: var(--gob-oro); margin-bottom: 20px; }

        /* Card de Búsqueda */
        .search-card { border: 1px solid var(--gob-gris-borde); border-radius: 4px; overflow: hidden; }
        .tabs-menu { display: flex; background: var(--gob-gris-fondo); }
        .tab-btn { flex: 1; padding: 15px 5px; font-size: 13px; text-align: center; cursor: pointer; color: #666; font-weight: 600; }
        .tab-btn.active { background: var(--gob-guinda); color: #fff; }

        .form-section { padding: 20px; display: none; flex-direction: column; gap: 15px; }
        .form-section.active { display: flex; }
        
        .field label { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
        .field input { width: 100%; padding: 12px; border: 1px solid #CCC; border-radius: 4px; font-size: 16px; }

        .btn-area { display: flex; flex-direction: column; gap: 10px; padding: 0 20px 20px; }
        .btn { padding: 14px; border-radius: 4px; font-weight: 600; font-size: 15px; cursor: pointer; text-align: center; border: 2px solid var(--gob-guinda); }
        .btn-buscar { color: var(--gob-guinda); background: #fff; }
        .btn-limpiar { border-color: var(--gob-oro); color: var(--gob-oro); background: #fff; }

        #results-container { display: none; padding: 20px 10px; overflow-x: auto; }
        .rnp-table { width: 100%; border-collapse: collapse; min-width: 600px; font-size: 12px; }
        .rnp-table th { background: #eee; padding: 10px; text-align: left; }
        .rnp-table td { padding: 10px; border-bottom: 1px solid #eee; }

        footer { background: var(--gob-guinda); color: #fff; padding: 40px 5%; margin-top: 50px; text-align: center; }

        /* Desktop Adjustments */
        @media (min-width: 768px) {
            .form-section.active { display: grid; grid-template-columns: repeat(3, 1fr); }
            .btn-area { flex-direction: row; justify-content: flex-end; }
            .btn { width: auto; min-width: 160px; }
            .nav-gob .logo-link img { height: 32px; }
        }
    </style>
</head>
<body>

    <div class="gob-menu-overlay" id="menuOverlay">
        <div class="header-menu-open">
            <a href="https://www.gob.mx/" class="logo-link">
                <img src="https://framework-gb.cdn.gob.mx/landing/img/logoheader.svg" alt="Gobierno de México">
            </a>
            <div class="close-menu-btn" onclick="toggleMenu()">
                <i class="fas fa-times"></i>
            </div>
        </div>

        <div class="menu-options-container">
            <a href="https://www.gob.mx/tramites" class="menu-link">Trámites</a>
            <a href="https://www.gob.mx/gobierno" class="menu-link">Gobierno</a>
            <div class="search-icon-large">
                <i class="fas fa-search"></i>
            </div>
        </div>
    </div>

    <nav class="nav-gob">
        <a href="https://www.gob.mx/" class="logo-link">
            <img src="https://framework-gb.cdn.gob.mx/landing/img/logoheader.svg" alt="Gobierno de México">
        </a>
        <div class="menu-ham-trigger" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </div>
    </nav>

    <div class="header-image-container">
        <img src="logo.png" alt="Registro Nacional de Profesionistas">
    </div>

    <main>
        <div class="breadcrumb">Inicio > <b>Búsqueda de Cédulas</b></div>

        <section class="intro-container">
            <h2>Búsqueda de Cédulas Profesionales</h2>
            <div class="linea-oro"></div>
            <p class="texto-principal">Consulta el Registro Nacional de Profesionistas de manera oficial.</p>
        </section>

        <div class="search-card">
            <div class="tabs-menu">
                <div id="tab-datos" class="tab-btn active" onclick="switchTab('datos')">DATOS GENERALES</div>
                <div id="tab-cedula" class="tab-btn" onclick="switchTab('cedula')">NÚMERO DE CÉDULA</div>
            </div>
            
            <div id="sec-datos" class="form-section active">
                <div class="field"><label>Nombre(s)*:</label><input type="text" id="in-nombre"></div>
                <div class="field"><label>Primer Apellido*:</label><input type="text" id="in-ap1"></div>
                <div class="field"><label>Segundo Apellido:</label><input type="text" id="in-ap2"></div>
            </div>

            <div id="sec-cedula" class="form-section">
                <div class="field"><label>Número de Cédula*:</label><input type="text" id="in-folio"></div>
            </div>

            <div class="btn-area">
                <button class="btn btn-buscar" onclick="buscar()">BUSCAR</button>
                <button class="btn btn-limpiar" onclick="location.reload()">LIMPIAR</button>
            </div>
        </div>

        <div id="results-container">
            <table class="rnp-table">
                <thead>
                    <tr><th>Cédula</th><th>Nombre Completo</th><th>Institución</th></tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>
    </main>

    <footer>
        <img src="https://framework-gb.cdn.gob.mx/landing/img/logoheader.svg" style="filter: brightness(0) invert(1); width: 150px; margin-bottom: 10px;">
        <p style="font-size: 12px; opacity: 0.7;">© 2026 Gobierno de México</p>
    </footer>

    <script>
        function toggleMenu() {
            const overlay = document.getElementById('menuOverlay');
            overlay.classList.toggle('active');
            document.body.style.overflow = overlay.classList.contains('active') ? 'hidden' : 'auto';
        }

        function switchTab(tipo) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-' + tipo).classList.add('active');
            document.getElementById('sec-' + tipo).classList.add('active');
        }

        function buscar() {
            const tabla = document.getElementById('cuerpoTabla');
            const container = document.getElementById('results-container');
            tabla.innerHTML = `<tr><td>10994202</td><td>JONATHAN FRANCISCO PEREZ AYALA</td><td>UVEG</td></tr>`;
            container.style.display = 'block';
        }
    </script>
</body>
</html>
