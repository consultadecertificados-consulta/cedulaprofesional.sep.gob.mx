<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Registro Nacional de Profesionistas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link rel="shortcut icon" href="https://framework-gb.cdn.gob.mx/gm/v4/image/favicon.ico">
  <link href="https://framework-gb.cdn.gob.mx/assets/styles/main.css" rel="stylesheet">

  <style>
    body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }

    /* BARRA 1: GUINDA OSCURO (HAMBURGUESA) */
    .bar-dark-guinda {
        background-color: #2D0014; /* Tono muy oscuro de la imagen */
        height: 60px;
        display: flex;
        align-items: center;
        padding-left: 20px;
        width: 100%;
    }

    .menu-hamburger {
        font-size: 30px;
        cursor: pointer;
        background: none;
        border: none;
        color: white;
    }

    /* BARRA 2: GUINDA CLARO (ESCUDO) */
    .bar-light-guinda {
        background-color: #621132; /* Tono guinda institucional */
        height: 40px;
        display: flex;
        align-items: center;
        padding-left: 20px;
        width: 100%;
    }

    .escudo-img {
        height: 25px; /* Ajuste del escudo dorado */
        opacity: 0.8;
    }

    /* PANEL LATERAL (MENÚ) */
    .side-menu {
        height: 100%;
        width: 0;
        position: fixed;
        z-index: 2000;
        top: 0;
        left: 0;
        background-color: #621132;
        overflow-x: hidden;
        transition: 0.4s;
        padding-top: 60px;
        text-align: center;
    }

    .side-menu a {
        padding: 15px;
        text-decoration: none;
        font-size: 18px;
        color: white;
        display: block;
        transition: 0.3s;
    }

    .side-menu a:hover {
        background-color: rgba(255,255,255,0.1);
    }

    .close-btn {
        position: absolute;
        top: 10px;
        right: 25px;
        font-size: 36px;
        color: white;
        background: none;
        border: none;
        cursor: pointer;
    }

    /* CONTENIDO PRINCIPAL */
    .main-container {
        padding: 20px;
        min-height: 400px;
    }
  </style>
</head>

<body>

  <div class="bar-dark-guinda">
    <button class="menu-hamburger" onclick="openNav()">&#9776;</button>
  </div>

  <div class="bar-light-guinda">
    <img src="https://framework-gb.cdn.gob.mx/landing/img/logoheader.svg" class="escudo-img" style="filter: brightness(0) saturate(100%) invert(86%) sepia(19%) saturate(836%) hue-rotate(3deg) brightness(92%) contrast(89%);" alt="Escudo">
  </div>

  <div id="mySideMenu" class="side-menu">
    <button class="close-btn" onclick="closeNav()">&times;</button>
    <a href="#">Inicio ▾</a>
    <a href="#">Cédulas Profesionales ▾</a>
    <a href="#">Especialistas: Cirugía Plástica, Estética y Reconstructiva</a>
    <a href="#">Cédulas Estatales</a>
    <a href="#">Datos Abiertos ▾</a>
    <a href="#">Contacto</a>
  </div>

  <main class="main-container container">
    <div class="row">
        <div class="col-md-12">
            <h2>Registro Nacional de Profesionistas</h2>
            <p>Ahora las barras están en el flujo normal del documento y no se enciman con el contenido.</p>
        </div>
    </div>
  </main>

  <footer class="main-footer">
    <div class="container-fluid footer-plege">
      <div class="container">
        <div class="row">
          <div class="col-sm-12"><br><br></div>
        </div>
      </div>
    </div>
  </footer>

  <script>
    function openNav() {
      document.getElementById("mySideMenu").style.width = "100%";
    }
    function closeNav() {
      document.getElementById("mySideMenu").style.width = "0";
    }
  </script>

</body>
</html>
