<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Registro Nacional de Profesionistas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link rel="shortcut icon" href="https://framework-gb.cdn.gob.mx/gm/v4/image/favicon.ico">
  <link href="https://framework-gb.cdn.gob.mx/assets/styles/main.css" rel="stylesheet">

  <style>
    body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }

    /* BARRA 1: GUINDA MUY OSCURO */
    .header-institucional {
        background-color: #2D0014;
        color: white;
        width: 100%;
        padding: 10px 0;
    }

    .header-institucional .container {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .logo-gob-mex {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .escudo-img {
        height: 60px;
    }

    .texto-gob-mex {
        font-family: sans-serif;
        font-size: 20px;
        font-weight: bold;
        line-height: 1.1;
    }

    /* BARRA 2: COLOR VINO (MENÚ SECUNDARIO) */
    .barra-navegacion-secundaria {
        background-color: #621132;
        width: 100%;
        height: 50px;
        display: flex;
        align-items: center;
    }

    .btn-hamburguesa {
        background: none;
        border: none;
        color: white;
        font-size: 28px;
        cursor: pointer;
        padding-left: 20px; /* Pegado a la izquierda */
    }

    /* PANEL DESPLEGABLE (OCULTO POR DEFECTO) */
    .menu-desplegable {
        display: none;
        background-color: #621132;
        width: 100%;
        text-align: center;
        padding-bottom: 20px;
        border-top: 1px solid rgba(255,255,255,0.1);
    }

    .menu-desplegable ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .menu-desplegable ul li a {
        color: white;
        text-decoration: none;
        font-size: 18px;
        display: block;
        padding: 15px 10px;
        font-family: 'Open Sans', sans-serif;
    }

    .menu-desplegable ul li a:hover {
        background-color: rgba(255,255,255,0.05);
    }

    /* PORTADA logo.png */
    .portada-section {
        width: 100%;
        line-height: 0;
    }

    .portada-img {
        width: 100%;
        height: auto;
        display: block;
    }

    main {
        padding-top: 20px;
        min-height: 300px;
    }
  </style>
</head>

<body>

  <header>
    <div class="header-institucional">
      <div class="container">
        <div class="logo-gob-mex">
          <img src="https://cedulaprofesional.sep.gob.mx/images/escudo.png" alt="Escudo" class="escudo-img">
          <div class="texto-gob-mex">Gobierno de<br>México</div>
        </div>
        <button class="btn-hamburguesa" style="padding-right:20px;">&#9776;</button>
      </div>
    </div>

    <div class="barra-navegacion-secundaria">
      <div class="container" style="margin-left: 0; padding-left: 0;">
        <button class="btn-hamburguesa" onclick="toggleMenu()">&#9776;</button>
      </div>
    </div>

    <nav id="menuOpciones" class="menu-desplegable">
      <ul>
        <li><a href="#">Inicio ▾</a></li>
        <li><a href="#">Cédulas Profesionales ▾</a></li>
        <li><a href="#">Especialistas: Cirugía Plástica, Estética y Reconstructiva</a></li>
        <li><a href="#">Cédulas Estatales</a></li>
        <li><a href="#">Datos Abiertos ▾</a></li>
        <li><a href="#">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <section class="portada-section">
      <img src="logo.png" alt="Portada" class="portada-img">
  </section>

  <main class="container">
    <div class="row">
        <div class="col-md-12">
            <h2>Registro Nacional de Profesionistas</h2>
            <p>El menú secundario ahora se despliega hacia abajo con las opciones centradas.</p>
        </div>
    </div>
  </main>

  <footer class="main-footer">
    <div class="container-fluid footer-plege">
      <div class="container">
        <div class="row">
          <div class="col-sm-12"><br><br></div>
        </div>
      </div>
    </div>
  </footer>

  <script>
    function toggleMenu() {
      var menu = document.getElementById("menuOpciones");
      if (menu.style.display === "block") {
        menu.style.display = "none";
      } else {
        menu.style.display = "block";
      }
    }
  </script>

</body>
</html>
