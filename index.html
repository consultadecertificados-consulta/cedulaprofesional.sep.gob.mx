<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Búsqueda de Cédulas Profesionales | RNP</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --gob-vino: #621132;    
            --gob-borgoña: #480721; 
            --gob-oro: #9D843E;
            --gob-texto: #4D4D4D;
            --gris-claro: #F2F2F2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; color: var(--gob-texto); background-color: #fff; line-height: 1.6; overflow-x: hidden; }

        /* HEADER */
        header { position: sticky; top: 0; z-index: 1000; width: 100%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-superior { background-color: var(--gob-vino); padding: 10px 8%; display: flex; justify-content: space-between; align-items: center; }
        .logo-gob-mex { height: 35px; filter: brightness(0) invert(1); }
        .nav-inferior { background-color: var(--gob-borgoña); padding: 0 8%; min-height: 50px; display: flex; align-items: center; }
        .menu-pc { display: flex; gap: 20px; list-style: none; }
        .menu-pc a { color: white; text-decoration: none; font-size: 14px; font-weight: 400; }

        /* PORTADA */
        .hero-section img { width: 100%; max-width: 1400px; height: auto; display: block; margin: 0 auto; max-height: 400px; object-fit: cover; }

        /* MAIN CONTENT */
        main { max-width: 1100px; margin: 0 auto; padding: 40px 5%; }
        
        .breadcrumb-button { text-decoration: none; color: #333; display: flex; margin-bottom: 20px; align-items: center; gap: 10px; }
        .text-lower { font-size: 24px; font-weight: 600; }

        .oro-line { width: 100%; height: 1px; background-color: #D3D3D3; margin: 20px 0 40px; position: relative; }
        .oro-line::before { content: ""; position: absolute; top: -2px; left: 0; width: 120px; height: 5px; background-color: var(--gob-oro); }

        /* FORMULARIO */
        .search-card { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .tabs { display: flex; background: var(--gris-claro); }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: 600; font-size: 14px; color: #666; border-bottom: 3px solid transparent; }
        .tab.active { background: #fff; color: var(--gob-vino); border-bottom: 3px solid var(--gob-vino); }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 30px; text-align: left; }
        .field { display: flex; flex-direction: column; }
        .field label { font-weight: 700; margin-bottom: 8px; font-size: 14px; }
        .field input { padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; outline: none; }
        .field input:focus { border-color: var(--gob-oro); }

        .btn-buscar { background-color: var(--gob-vino); color: white; border: none; padding: 12px 40px; border-radius: 4px; font-weight: 600; cursor: pointer; margin: 0 30px 30px; transition: 0.3s; }
        .btn-buscar:hover { background-color: var(--gob-borgoña); }

        /* FOOTER */
        .footer-gob { margin-top: 60px; border-top: 6px solid var(--gob-oro); width: 100%; }
        .footer-top { background-color: #f6f6f6; padding: 40px 0; border-bottom: 1px solid #ddd; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .img-footer-sep { height: 60px; filter: grayscale(1); opacity: 0.6; margin-bottom: 15px; }
        .footer-col-links h5 { font-size: 13px; text-transform: uppercase; margin-bottom: 15px; color: #333; }
        .footer-col-links ul { list-style: none; }
        .footer-col-links a { color: var(--gob-texto); text-decoration: none; font-size: 14px; line-height: 2; }
        .footer-pleca { background-color: var(--gob-borgoña); padding: 25px 0; color: white; }
        .flex-pleca { max-width: 1100px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .logo-footer-mex { height: 35px; filter: brightness(0) invert(1); }
        .pleca-links a { color: white; text-decoration: none; font-size: 13px; margin-left: 20px; }

        @media (max-width: 768px) {
            .flex-pleca { flex-direction: column; text-align: center; }
            .pleca-links a { margin: 5px 10px; display: inline-block; }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-superior">
        <img src="https://cdn.gob.mx" class="logo-gob-mex" alt="Gobierno de México">
    </div>
    <div class="nav-inferior">
        <ul class="menu-pc">
            <li><a href="#">Trámites</a></li>
            <li><a href="#">Gobierno</a></li>
        </ul>
    </div>
</header>

<div class="hero-section">
    <img src="https://www.gob.mx" alt="Cédula">
</div>

<main>
    <div class="breadcrumb-button">
        <i class="fas fa-home"></i>
        <span class="text-lower">Búsqueda de Cédulas Profesionales</span>
    </div>

    <div class="oro-line"></div>

    <div class="search-card">
        <div class="tabs">
            <div class="tab active">BÚSQUEDA POR NOMBRE</div>
            <div class="tab">BÚSQUEDA POR CURP</div>
        </div>
        <form>
            <div class="form-grid">
                <div class="field">
                    <label>Nombre(s):</label>
                    <input type="text" placeholder="Ej: Juan">
                </div>
                <div class="field">
                    <label>Primer Apellido:</label>
                    <input type="text" placeholder="Ej: Pérez">
                </div>
                <div class="field">
                    <label>Segundo Apellido:</label>
                    <input type="text" placeholder="Ej: García">
                </div>
            </div>
            <button type="button" class="btn-buscar">Consultar</button>
        </form>
    </div>
</main>

<footer class="footer-gob">
    <div class="footer-top">
        <div class="footer-grid">
            <div class="footer-col-logo">
                <img src="https://wikimedia.org" class="img-footer-sep">
                <p style="font-size: 12px;">Secretaría de Educación Pública</p>
            </div>
            <div class="footer-col-links">
                <h5>Enlaces</h5>
                <ul>
                    <li><a href="#">Participa</a></li>
                    <li><a href="#">Datos Abiertos</a></li>
                    <li><a href="#">Transparencia</a></li>
                </ul>
            </div>
            <div class="footer-col-links">
                <h5>Contacto</h5>
                <p style="font-size: 13px;">Mesa de ayuda:<br><b>mesadeayuda@nube.sep.gob.mx</b></p>
            </div>
        </div>
    </div>
    <div class="footer-pleca">
        <div class="flex-pleca">
            <img src="https://cdn.gob.mx" class="logo-footer-mex">
            <div class="pleca-links">
                <a href="#">Privacidad</a>
                <a href="#">Accesibilidad</a>
                <a href="#">Contacto</a>
            </div>
        </div>
    </div>
</footer>

</body>
</html>
