<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Registro Nacional de Profesionistas</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  
  <link rel="shortcut icon" href="https://framework-gb.cdn.gob.mx/gm/v4/image/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
  
  <style>
    /* 1. ELIMINACIÓN RADICAL DE CUALQUIER RASTRO DEL HTML 1 */
    /* Bloqueamos todos los selectores posibles que inyecta el framework de la SEP */
    header, footer, nav, .navbar, .main-footer, .gobmx-header, .gobmx-footer, #cabecera, #pie {
        display: none !important;
        height: 0 !important;
        overflow: hidden !important;
        opacity: 0 !important;
    }

    /* 2. FORZAR VISIBILIDAD DE NUESTRO NUEVO DISEÑO (HTML 2) */
    .menu-objetivo, .footer-objetivo {
        display: flex !important; /* Forzamos que se vea */
        opacity: 1 !important;
        visibility: visible !important;
    }

    :root {
      --gob-guinda: #621132;
      --gob-oro: #9D843E;
      --gob-verde-oscuro: #0C231E;
      --gob-gris-fondo: #F2F2F2;
      --gob-gris-borde: #D9D9D9;
      --gob-texto-p: #6F7271;
      --gob-texto-negro: #4D4D4D;
    }

    body { font-family: 'Montserrat', sans-serif; margin: 0; background: #fff; }

    /* Estilo Menú Hamburguesa Superior */
    .menu-objetivo { 
        background-color: var(--gob-verde-oscuro); 
        padding: 12px 10%; 
        justify-content: space-between; 
        align-items: center;
        position: relative;
        z-index: 99999 !important;
    }

    .logo-container-objetivo { 
        width: 100%; 
        border-bottom: 8px solid var(--gob-oro); 
        z-index: 99998 !important;
    }
    .logo-container-objetivo img { width: 100%; display: block; }

    /* Contenedor principal para que el contenido de Angular no suba */
    main.wrapper { max-width: 1100px; margin: 0 auto; padding: 20px; }

    /* Estilos del Buscador (Copiados del HTML 2) */
    .search-card { border: 1px solid var(--gob-gris-borde); border-radius: 6px; overflow: hidden; margin-top: 20px; background: #fff; }
    .tabs-menu { display: flex; background: var(--gob-gris-fondo); }
    .tab-btn { padding: 15px 35px; cursor: pointer; font-weight: 500; color: #666; border: none; background: none; font-family: 'Montserrat'; }
    .tab-btn.active { background: var(--gob-guinda); color: #fff; font-weight: 600; }

    .form-section { padding: 40px; display: none; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
    .form-section.active { display: grid; }
    
    .field { display: flex; flex-direction: column; font-size: 14px; font-weight: 700; }
    .field input { padding: 12px; border: 1px solid #CCC; border-radius: 4px; margin-top: 8px; font-family: 'Montserrat'; }

    .btn-area { display: flex; justify-content: flex-end; gap: 15px; padding: 0 40px 40px; }
    .btn-objetivo { padding: 12px 40px; border-radius: 4px; font-weight: 600; cursor: pointer; border: 2px solid transparent; }
    .btn-buscar { border-color: var(--gob-guinda); color: var(--gob-guinda); background: #fff; }
    .btn-limpiar { border-color: var(--gob-oro); color: var(--gob-oro); background: #fff; }

    /* Pie de página Objetivo */
    .footer-objetivo { 
        background: var(--gob-guinda); 
        color: #fff; 
        padding: 60px 10%; 
        flex-direction: column;
        z-index: 99999 !important;
    }
    .f-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; width: 100%; }
    .f-col h4 { border-bottom: 2px solid var(--gob-oro); padding-bottom: 5px; margin-bottom: 20px; font-size: 15px; }
    .f-col a { color: #fff; text-decoration: none; display: block; margin-bottom: 10px; font-size: 13px; opacity: 0.9; }
  </style>
</head>

<body>

  <nav class="menu-objetivo">
    <img src="https://framework-gb.cdn.gob.mx/landing/img/logoheader.svg" height="28" alt="Gobierno">
    <div style="color: white; font-size: 22px;"><i class="fas fa-bars"></i></div>
  </nav>

  <div class="logo-container-objetivo">
    <img src="logo.png" alt="Registro Nacional">
  </div>

  <app-root>
    <main class="wrapper">
        <div style="padding: 20px 0; color: #666;">Inicio > <b>Búsqueda de Cédulas Profesionales</b></div>
        
        <h2 style="font-size: 32px; color: #4D4D4D;">Realiza tu búsqueda de forma segura y confiable.</h2>
        <div style="width: 50px; height: 5px; background: var(--gob-oro); margin: 20px 0;"></div>

        <div class="search-card">
            <div class="tabs-menu">
                <button class="tab-btn active" onclick="switchTab('datos')">Datos generales</button>
                <button class="tab-btn" onclick="switchTab('cedula')">Número de cédula</button>
            </div>
            
            <div id="sec-datos" class="form-section active">
                <div class="field"><label>Nombre(s)*:</label><input type="text" id="in-nombre" placeholder="Nombre(s)"></div>
                <div class="field"><label>Primer Apellido*:</label><input type="text" id="in-ap1" placeholder="Primer Apellido"></div>
                <div class="field"><label>Segundo Apellido:</label><input type="text" id="in-ap2" placeholder="Segundo Apellido"></div>
            </div>

            <div id="sec-cedula" class="form-section">
                <div class="field"><label>Número de cédula*:</label><input type="text" id="in-folio" placeholder="Ej. 10994202"></div>
            </div>

            <div class="btn-area">
                <button class="btn-objetivo btn-buscar" onclick="alert('Buscando...')">Buscar</button>
                <button class="btn-objetivo btn-limpiar" onclick="location.reload()">Limpiar</button>
            </div>
        </div>
    </main>
  </app-root>

  <footer class="footer-objetivo">
    <div class="f-grid">
        <div class="f-col"><img src="https://framework-gb.cdn.gob.mx/landing/img/logoheader.svg" style="filter: brightness(0) invert(1); width: 180px;"></div>
        <div class="f-col">
            <h4>Enlaces</h4>
            <a href="#">Participa</a><a href="#">Marco Jurídico</a><a href="#">Transparencia</a>
        </div>
        <div class="f-col">
            <h4>¿Qué es gob.mx?</h4>
            <a href="#">Datos abiertos</a><a href="#">Accesibilidad</a>
        </div>
    </div>
  </footer>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script>
    function switchTab(t) {
        $('.tab-btn').removeClass('active');
        $('.form-section').removeClass('active');
        if(t=='datos'){ $('.tab-btn:first').addClass('active'); $('#sec-datos').addClass('active'); }
        else { $('.tab-btn:last').addClass('active'); $('#sec-cedula').addClass('active'); }
    }
  </script>

  <script src="runtime.925c27308c452069.js" type="module"></script>
  <script src="polyfills.360ae0520f0a2274.js" type="module"></script>
  <script src="scripts.d170e30c87e112f0.js" defer></script>
  <script src="main.7dc5cf82893323a9.js" type="module"></script>

</body>
</html>
