<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <title>Registro Nacional de Profesionistas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link href="https://framework-gb.cdn.gob.mx/gm/v4/image/favicon.ico" rel="shortcut icon">
  <link href="https://framework-gb.cdn.gob.mx/assets/styles/main.css" rel="stylesheet">

  <style>
    /* 1. Corrección de encimado: El body necesita espacio para el header fijo */
    body {
      padding-top: 50px; 
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* 2. Barra Color Vino */
    .navbar-vino {
      background-color: #480c1d;
      color: #ffffff;
      min-height: 45px;
      display: flex;
      align-items: center;
      border-bottom: 2px solid #D4C19C;
    }

    .btn-hamburguesa {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      padding: 10px 15px;
      cursor: pointer;
    }

    /* 3. Espaciado del contenido principal */
    main {
      flex: 1; /* Empuja el footer hacia abajo */
      padding: 20px 0;
    }

    /* 4. Pie de página institucional */
    .footer-institucional {
      background-color: #12322b;
      color: white;
      padding: 40px 0;
      margin-top: auto;
    }
    
    .footer-institucional a {
      color: white;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <header>
    <nav class="navbar navbar-inverse navbar-fixed-top" role="navigation">
      <div class="container">
        <div class="navbar-header">
          <a class="navbar-brand" href="https://www.gob.mx/">
            <img src="https://framework-gb.cdn.gob.mx/landing/img/logo-header.svg" alt="Gobierno de México" height="29">
          </a>
        </div>
        <div class="collapse navbar-collapse">
          <ul class="nav navbar-nav navbar-right">
            <li><a href="#">Trámites</a></li>
            <li><a href="#">Gobierno</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <nav class="navbar-vino">
    <div class="container">
      <button class="btn-hamburguesa">
        <span class="glyphicon glyphicon-menu-hamburger"></span>
      </button>
    </div>
  </nav>

  <main>
    <div class="container">
       </div>
  </main>

  <footer class="footer-institucional">
    <div class="container">
      <div class="row">
        <div class="col-md-3">
          <img src="https://framework-gb.cdn.gob.mx/landing/img/logo-header.svg" alt="Logo México" class="img-responsive" style="filter: brightness(0) invert(1); margin-bottom: 20px;">
        </div>
        <div class="col-md-3">
          <h5>Enlaces</h5>
          <ul class="list-unstyled">
            <li><a href="#">Participa</a></li>
            <li><a href="#">Publicaciones Oficiales</a></li>
            <li><a href="#">Marco Jurídico</a></li>
          </ul>
        </div>
        <div class="col-md-3">
          <h5>¿Qué es gob.mx?</h5>
          <p>Es el portal único de trámites, información y participación ciudadana.</p>
        </div>
        <div class="col-md-3">
          <h5>Síguenos en</h5>
          <p>Facebook | Twitter</p>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://framework-gb.cdn.gob.mx/gobmx.js"></script>
</body>

</html>
