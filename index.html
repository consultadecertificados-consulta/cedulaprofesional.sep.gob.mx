<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Registro Nacional de Profesionistas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link rel="shortcut icon" href="https://framework-gb.cdn.gob.mx/gm/v4/image/favicon.ico">

  <link href="https://framework-gb.cdn.gob.mx/assets/styles/main.css" rel="stylesheet">

  <style>
    /* Reset básico para asegurar que las barras ocupen todo el ancho */
    body {
        margin: 0;
        padding: 0;
        overflow-x: hidden; /* Evita scroll horizontal */
    }

    /* 1. BARRA INSTITUCIONAL SUPERIOR (Guinda Oscuro) - Como en la imagen */
    .header-institucional {
        background-color: #2D0014; /* Color guinda muy oscuro */
        color: white;
        width: 100%;
        padding: 10px 0; /* Espaciado vertical */
    }

    .header-institucional .container {
        display: flex;
        justify-content: space-between; /* Escudo a la izq, Hamburguesa a la der */
        align-items: center;
    }

    .logo-gob-mex {
        display: flex;
        align-items: center;
        gap: 10px; /* Espacio entre escudo y texto */
    }

    .escudo-img {
        height: 60px; /* Ajuste del escudo dorado */
    }

    .texto-gob-mex {
        font-family: 'Open Sans', 'Noto Sans', sans-serif;
        font-size: 20px;
        font-weight: bold;
        line-height: 1.1;
    }

    /* 2. BARRA DE NAVEGACIÓN SECUNDARIA (Guinda Medio) - Como en la imagen */
    .barra-navegacion-secundaria {
        background-color: #621132; /* Tono guinda de la SEP */
        width: 100%;
        height: 50px; /* Altura de la barra */
        display: flex;
        align-items: center;
    }

    .barra-navegacion-secundaria .container {
        display: flex;
        justify-content: flex-start; /* Hamburguesa a la izquierda */
        align-items: center;
    }

    /* Botones hamburguesa para ambas barras */
    .btn-hamburguesa {
        background: none;
        border: none;
        color: white;
        font-size: 28px;
        cursor: pointer;
        padding: 0 15px;
    }

    /* 3. ESTILOS DE LA PORTADA (logo.png) */
    .portada-section {
        width: 100%;
        padding: 0; /* Sin padding para que la imagen ocupe todo el ancho */
        margin: 0;
        line-height: 0; /* Evita espacios extra debajo de la imagen */
    }

    .portada-img {
        width: 100%; /* Imagen responsive ocupando todo el ancho */
        height: auto;
        display: block; /* Elimina espacio inferior por defecto */
        border: none;
    }

    /* Ajuste para el contenido que sigue a la portada */
    main {
        padding-top: 20px;
        min-height: 300px;
    }
  </style>
</head>

<body>

  <header>
    <div class="header-institucional">
      <div class="container">
        <div class="logo-gob-mex">
          <img src="https://cedulaprofesional.sep.gob.mx/images/escudo.png" alt="Escudo Nacional" class="escudo-img">
          <div class="texto-gob-mex">
            Gobierno de<br>México
          </div>
        </div>
        <button class="btn-hamburguesa" aria-label="Menú Principal">&#9776;</button>
      </div>
    </div>

    <div class="barra-navegacion-secundaria">
      <div class="container">
        <button class="btn-hamburguesa" aria-label="Menú de Navegación Secundario">&#9776;</button>
      </div>
    </div>
  </header>
  <section class="portada-section">
      <img src="logo.png" alt="Portada Registro Nacional de Profesionistas" class="portada-img">
  </section>
  <main class="container">
    <div class="row">
        <div class="col-md-12">
            <h2>Búsqueda de Cédulas Profesionales</h2>
            <p>Este es el espacio donde trabajaremos los siguientes pasos de la consulta.</p>
        </div>
    </div>
  </main>


  <footer class="main-footer">
    <div class="container-fluid footer-plege">
      <div class="container">
        <div class="row">
          <div class="col-sm-12">
            <br>
            <br>
          </div>
        </div>
      </div>
    </div>
  </footer>
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://framework-gb.cdn.gob.mx/gobmx.js"></script>

</body>
</html>
