<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Registro Nacional de Profesionistas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link rel="shortcut icon" href="https://framework-gb.cdn.gob.mx/gm/v4/image/favicon.ico">
  <link href="https://framework-gb.cdn.gob.mx/assets/styles/main.css" rel="stylesheet">

  <style>
    body { margin: 0; padding: 0; overflow-x: hidden; font-family: 'Open Sans', sans-serif; }

    /* BARRA SUPERIOR (COMO LA IMAGEN) */
    .header-top {
        background-color: #621132; /* Guinda Institucional */
        color: white;
        padding: 15px 0;
        width: 100%;
    }
    .header-top .container {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .logo-mex {
        display: flex;
        align-items: center;
        gap: 15px;
    }
    .logo-mex img { height: 75px; } /* Tamaño del escudo según imagen */
    .logo-mex span { font-size: 24px; font-weight: 600; line-height: 1; }

    /* BARRA HAMBURGUESA IZQUIERDA (GUINDA OSCURO) */
    .nav-bar-dark {
        background-color: #2D0014; /* Guinda muy oscuro como la imagen */
        width: 100%;
        height: 55px;
        display: flex;
        align-items: center;
    }

    .btn-nav {
        background: none;
        border: none;
        color: white;
        font-size: 32px;
        cursor: pointer;
        padding-left: 20px; /* Pegado a la izquierda */
    }

    .btn-top-right {
        background: none;
        border: none;
        color: white;
        font-size: 32px;
    }

    /* MENÚ DESPLEGABLE HACIA ABAJO */
    .menu-vertical {
        display: none; /* Se activa con JS */
        background-color: #621132;
        width: 100%;
        text-align: center;
        padding: 20px 0;
    }
    .menu-vertical ul { list-style: none; padding: 0; margin: 0; }
    .menu-vertical ul li a {
        color: white;
        text-decoration: none;
        font-size: 18px;
        display: block;
        padding: 12px;
    }

    /* PORTADA */
    .portada-full { width: 100%; line-height: 0; }
    .portada-full img { width: 100%; height: auto; display: block; }

    /* PIE DE PÁGINA (RESTAURADO) */
    .main-footer { background-color: #f4f4f4; width: 100%; }
    .footer-plege { background-color: #f4f4f4; border-top: 1px solid #ddd; }
  </style>
</head>

<body>

  <header>
    <div class="header-top">
      <div class="container">
        <div class="logo-mex">
          <img src="https://cedulaprofesional.sep.gob.mx/images/escudo.png" alt="Escudo">
          <span>Gobierno de<br>México</span>
        </div>
        <button class="btn-top-right">&#9776;</button>
      </div>
    </div>

    <div class="nav-bar-dark">
      <div class="container" style="margin: 0; width: 100%;">
        <button class="btn-nav" onclick="toggleMenu()">&#9776;</button>
      </div>
    </div>

    <nav id="menuOpciones" class="menu-vertical">
      <ul>
        <li><a href="#">Inicio ▾</a></li>
        <li><a href="#">Cédulas Profesionales ▾</a></li>
        <li><a href="#">Especialistas: Cirugía Plástica, Estética y Reconstructiva</a></li>
        <li><a href="#">Cédulas Estatales</a></li>
        <li><a href="#">Datos Abiertos ▾</a></li>
        <li><a href="#">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <section class="portada-full">
    <img src="logo.png" alt="Registro Nacional de Profesionistas">
  </section>

  <main class="container" style="min-height: 200px; padding-top: 30px;">
    <h3>Contenido del Registro</h3>
  </main>

  <footer class="main-footer">
    <div class="container-fluid footer-plege">
      <div class="container">
        <div class="row">
          <div class="col-sm-12"><br><br></div>
        </div>
      </div>
    </div>
  </footer>

  <script>
    function toggleMenu() {
      var x = document.getElementById("menuOpciones");
      if (x.style.display === "block") {
        x.style.display = "none";
      } else {
        x.style.display = "block";
      }
    }
  </script>

</body>
</html>
