<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Búsqueda de Cédulas Profesionales | RNP</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <style>
        :root {
            --gob-vino: #621132;    
            --gob-borgoña: #480721; 
            --gob-oro: #9D843E;
            --gob-texto: #4D4D4D;
            --gob-gris-f: #F2F2F2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; color: var(--gob-texto); background-color: #fff; }

        header { position: sticky; top: 0; z-index: 1000; width: 100%; }

        /* NAVEGACIÓN MÓVIL DISPOSICIÓN */
        .nav-superior {
            background-color: var(--gob-vino);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-gob-mex { height: 40px; }
        .btn-ham-right { order: 2; color: white; background: none; border: none; font-size: 26px; cursor: pointer; }

        .nav-inferior {
            background-color: var(--gob-borgoña);
            padding: 0 5%;
            min-height: 50px;
            display: flex;
            align-items: center;
        }
        .btn-ham-left { color: white; background: none; border: none; font-size: 26px; cursor: pointer; }

        /* MENÚS DESPLEGABLES (Estilo Imagen 1) */
        .mobile-menu {
            display: none;
            flex-direction: column;
            width: 100%;
            position: absolute;
            left: 0;
            top: 100%;
            z-index: 999;
            text-align: center;
        }
        .mobile-menu a {
            color: white; padding: 20px 5%; text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 18px;
            display: block;
        }

        /* PORTADA */
        .hero-section { width: 100%; border-bottom: 8px solid var(--gob-oro); line-height: 0; }
        .hero-section img { width: 100%; height: auto; max-height: 400px; object-fit: contain; display: block; margin: 0 auto; }

        /* SECCIÓN TÍTULOS CENTRADOS (Imagen 3) */
        main { max-width: 1100px; margin: 0 auto; padding: 30px 5%; text-align: center; }
        
        .breadcrumb-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; color: #666; }
        .breadcrumb-container i { font-size: 24px; margin-bottom: 5px; }
        .breadcrumb-text { font-size: 22px; font-weight: 500; }

        .section-title { 
            font-size: 36px; /* Letra más grande como pediste */
            font-weight: 700; 
            color: #333; 
            margin: 20px auto;
            max-width: 800px;
            line-height: 1.2;
        }

        /* TARJETA BUSCADOR (Imagen 4 y 5) */
        .search-card { 
            border: 1px solid #eee; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            overflow: hidden; 
            text-align: left;
            margin-top: 40px;
        }
        .tabs { display: flex; background: var(--gob-gris-f); }
        .tab { 
            flex: 1; 
            padding: 15px; 
            text-align: center; 
            font-size: 16px; 
            cursor: pointer; 
            color: #666;
            transition: 0.3s;
        }
        .tab.active { background: var(--gob-vino); color: white; }

        .form-content { padding: 30px; }
        .field { display: flex; flex-direction: column; margin-bottom: 20px; }
        .field label { font-size: 18px; font-weight: 700; margin-bottom: 10px; color: #333; }
        .field input { 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 16px; 
            background-color: #fff;
        }

        /* BOTONES DENTRO DEL MARCO (Imagen 4) */
        .form-actions { 
            display: flex; 
            justify-content: flex-start; 
            gap: 10px; 
            padding: 0 30px 30px; 
        }
        .btn { 
            padding: 12px 25px; 
            border-radius: 4px; 
            font-weight: 500; 
            cursor: pointer; 
            font-size: 15px; 
            border: 2px solid;
            background: #fff;
        }
        .btn-search { border-color: var(--gob-vino); color: var(--gob-vino); }
        .btn-clear { border-color: var(--gob-oro); color: var(--gob-oro); }
        .btn-csv { background: #b3b3b3; color: white; border-color: #b3b3b3; }

        /* FOOTER */
        footer { background-color: var(--gob-vino); color: white; padding: 40px 8% 20px; text-align: left; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; }
        .footer-col h4 { font-size: 16px; margin-bottom: 15px; border-bottom: 2px solid var(--gob-oro); padding-bottom: 5px; }

        @media (max-width: 768px) {
            .section-title { font-size: 28px; }
            .form-actions { flex-direction: column; }
            .btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

<header>
    <nav class="nav-superior">
        <img src="https://framework-gb.cdn.gob.mx/landing/img/logoheader.svg" class="logo-gob-mex">
        <button class="btn-ham-right" onclick="toggleMenu('menuGob')"><i class="fas fa-bars"></i></button>
        <div id="menuGob" class="mobile-menu" style="background-color: var(--gob-vino);">
            <a href="#">Trámites</a>
            <a href="#">Gobierno</a>
        </div>
    </nav>

    <nav class="nav-inferior">
        <button class="btn-ham-left" onclick="toggleMenu('menuRNP')"><i class="fas fa-bars"></i></button>
        <div id="menuRNP" class="mobile-menu" style="background-color: var(--gob-borgoña);">
            <a href="#">Inicio <i class="fas fa-caret-down"></i></a>
            <a href="#">Cédulas Profesionales <i class="fas fa-caret-down"></i></a>
            <a href="#">Especialistas</a>
            <a href="#">Cédulas Estatales</a>
            <a href="#">Datos Abiertos <i class="fas fa-caret-down"></i></a>
            <a href="#">Contacto</a>
        </div>
    </nav>
</header>

<div class="hero-section">
    <img src="logo.png" alt="RNP">
</div>

<main>
    <div class="breadcrumb-container">
        <i class="fas fa-home"></i>
        <span class="breadcrumb-text">Inicio > Búsqueda de Cédulas Profesionales</span>
    </div>
    
    <h1 class="section-title">Realiza tu búsqueda de forma segura y confiable.</h1>
    <div class="oro-line" style="margin: 0 auto 30px;"></div>

    <div class="search-card">
        <div class="tabs">
            <div class="tab active" id="tab-datos" onclick="showTab('datos')">Datos generales</div>
            <div class="tab" id="tab-cedula" onclick="showTab('cedula')">Número de cédula</div>
        </div>
        
        <div class="form-content">
            <div id="form-datos">
                <div class="field">
                    <label>Nombre(s)*:</label>
                    <input type="text" placeholder="Nombre(s)">
                </div>
                <div class="field">
                    <label>Primer Apellido*:</label>
                    <input type="text" placeholder="Primer Apellido">
                </div>
                <div class="field">
                    <label>Segundo Apellido:</label>
                    <input type="text" placeholder="Segundo Apellido">
                </div>
                <div class="field">
                    <label>CURP:</label>
                    <input type="text" placeholder="CURP">
                </div>
            </div>

            <div id="form-cedula" style="display: none;">
                <div class="field">
                    <label>Número de Cédula*:</label>
                    <input type="text" placeholder="Cédula">
                </div>
            </div>
        </div>

        <div class="form-actions">
            <button class="btn btn-search">Buscar</button>
            <button class="btn btn-clear">Limpiar</button>
            <button class="btn btn-csv">CSV <i class="fas fa-file-csv"></i></button>
        </div>
    </div>
</main>

<footer>
    <div class="footer-grid">
        <div class="footer-col">
            <img src="https://framework-gb.cdn.gob.mx/landing/img/logoheader.svg" style="filter: brightness(0) invert(1); width: 150px;">
        </div>
        <div class="footer-col">
            <h4>Enlaces</h4>
            <a href="#">Datos abiertos</a>
            <a href="#">Marco Jurídico</a>
        </div>
    </div>
</footer>

<script src="folios.js"></script>
<script>
    function toggleMenu(id) {
        const m = document.getElementById(id);
        const isVisible = m.style.display === 'flex';
        document.querySelectorAll('.mobile-menu').forEach(el => el.style.display = 'none');
        m.style.display = isVisible ? 'none' : 'flex';
    }

    function showTab(type) {
        const tabDatos = document.getElementById('tab-datos');
        const tabCedula = document.getElementById('tab-cedula');
        const formDatos = document.getElementById('form-datos');
        const formCedula = document.getElementById('form-cedula');

        if(type === 'datos') {
            tabDatos.classList.add('active');
            tabCedula.classList.remove('active');
            formDatos.style.display = 'block';
            formCedula.style.display = 'none';
        } else {
            tabCedula.classList.add('active');
            tabDatos.classList.remove('active');
            formDatos.style.display = 'none';
            formCedula.style.display = 'block';
        }
    }
</script>
</body>
</html>
