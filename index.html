<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <title>Registro Nacional de Profesionistas - Consulta</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <link rel="shortcut icon" href="https://framework-gb.cdn.gob.mx/gm/v4/image/favicon.ico">
  <link href="https://framework-gb.cdn.gob.mx/assets/styles/main.css" rel="stylesheet">
  
  <style>
    body { font-family: 'Noto Sans', sans-serif; background-color: #f5f5f5; padding-bottom: 50px; }
    .header-image { width: 100%; max-width: 900px; display: block; margin: 20px auto; }
    .search-container { 
        max-width: 800px; 
        margin: 0 auto; 
        padding: 30px; 
        background: #fff; 
        border-top: 5px solid #12322b; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    }
    .btn-sep { background-color: #12322b; color: white; border: none; padding: 10px 25px; cursor: pointer; }
    .btn-sep:hover { background-color: #1d4e42; }
    
    /* Tarjeta de Resultados */
    #resultado { margin-top: 30px; }
    .card-pro { 
        border: 1px solid #ddd; 
        padding: 20px; 
        border-radius: 4px; 
        text-align: left; 
        background: #fafafa;
    }
    .card-pro h3 { color: #9d2449; margin-top: 0; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .label { font-weight: bold; color: #545454; font-size: 0.9em; }
    .value { color: #000; margin-bottom: 5px; }
    
    .btn-download { 
        display: block; 
        width: 100%; 
        text-align: center; 
        background-color: #9d2449; 
        color: white !important; 
        padding: 12px; 
        text-decoration: none; 
        font-weight: bold;
        border-radius: 4px;
    }
    .alert-error { color: #a94442; background-color: #f2dede; padding: 15px; border-radius: 4px; border: 1px solid #ebccd1; }
  </style>
</head>

<body>

  <div class="container">
    <img src="logo.png" alt="SEP Portada" class="header-image">

    <div class="search-container">
      <h2 class="text-center">Búsqueda de Cédulas Profesionales</h2>
      <hr>
      <p>Introduzca el número de cédula (ID) para verificar la autenticidad y descargar la constancia correspondiente.</p>
      
      <div class="form-group">
        <label for="inputFolio">Número de Cédula / Folio:</label>
        <div class="input-group">
          <input type="text" id="inputFolio" class="form-control" placeholder="Ej: 10994202">
          <span class="input-group-btn">
            <button class="btn btn-primary btn-sep" onclick="consultar()">Consultar</button>
          </span>
        </div>
      </div>

      <div id="resultado"></div>
    </div>
  </div>

  <script src="folios.js"></script>

  <script>
    function consultar() {
      const folioBusqueda = document.getElementById('inputFolio').value.trim();
      const divResultado = document.getElementById('resultado');
      
      if (!folioBusqueda) {
        divResultado.innerHTML = '<p class="alert-error">Por favor, ingrese un número de cédula.</p>';
        return;
      }

      // Buscar en el array 'registros' que viene de folios.js
      const persona = registros.find(r => r.id === folioBusqueda);

      if (persona) {
        divResultado.innerHTML = `
          <div class="card-pro">
            <h3>Información del Profesionista</h3>
            <div class="info-grid">
              <div>
                <div class="label">NOMBRE COMPLETO</div>
                <div class="value">${persona.nom} ${persona.ap1} ${persona.ap2}</div>
              </div>
              <div>
                <div class="label">CURP</div>
                <div class="value">${persona.curp}</div>
              </div>
              <div>
                <div class="label">INSTITUCIÓN</div>
                <div class="value">${persona.inst}</div>
              </div>
              <div>
                <div class="label">CARRERA / PROFESIÓN</div>
                <div class="value">${persona.prof}</div>
              </div>
              <div>
                <div class="label">AÑO DE EXPEDICIÓN</div>
                <div class="value">${persona.anio}</div>
              </div>
              <div>
                <div class="label">ESTADO</div>
                <div class="value">${persona.ent}</div>
              </div>
            </div>
            
            <a href="${persona.archivo}" download class="btn-download">
              DESCARGAR CONSTANCIA (PDF)
            </a>
          </div>
        `;
      } else {
        divResultado.innerHTML = `
          <div class="alert-error">
            <strong>Sin resultados:</strong> El número de cédula "${folioBusqueda}" no se encuentra en el Registro Nacional de Profesionistas.
          </div>
        `;
      }
    }

    // Permitir búsqueda al presionar "Enter"
    document.getElementById('inputFolio').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') consultar();
    });
  </script>

</body>
</html>
