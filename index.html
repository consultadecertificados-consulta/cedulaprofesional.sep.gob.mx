<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Registro Nacional de Profesionistas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link rel="shortcut icon" href="https://framework-gb.cdn.gob.mx/gm/v4/image/favicon.ico">

  <link href="https://framework-gb.cdn.gob.mx/assets/styles/main.css" rel="stylesheet">

  <style>
    /* Ajuste para el contenido principal debido al header fijo */
    body {
        padding-top: 90px; /* Espacio para que el contenido no quede debajo del header negro */
    }

    /* BARRA COLOR VINO (GUINDA) */
    .barra-vino {
        background-color: #621132; /* Color guinda institucional */
        color: white;
        padding: 15px 0;
        margin-bottom: 20px; /* Espacio con el contenido de abajo */
        width: 100%;
    }

    .barra-vino .container {
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .titulo-barra {
        font-size: 24px;
        font-weight: bold;
        margin: 0;
    }

    /* Buscador simple dentro de la barra vino (opcional, basado en diseño común) */
    .search-box-vino {
        display: flex;
        gap: 5px;
    }
    .search-box-vino input {
        border: 1px solid #ccc;
        padding: 6px 12px;
        border-radius: 4px;
        color: #333;
    }
    .search-box-vino button {
        background-color: #D4C19C; /* Dorado pálido */
        color: #621132;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
        font-weight: bold;
    }

    /* SECCIÓN DE LA PORTADA (LOGO.PNG) */
    .portada-container {
        text-align: center;
        margin-bottom: 30px;
    }

    .portada-img {
        max-width: 100%; /* Se adapta al ancho de la pantalla */
        height: auto;
        border-radius: 8px; /* Opcional: bordes redondeados */
        box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Opcional: sombra suave */
    }
  </style>
</head>

<body>

  <header>
    <nav class="navbar navbar-inverse navbar-fixed-top" role="navigation">
      <div class="container">
        <div class="navbar-header">
          <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbarMainCollapse">
            <span class="sr-only">Interruptor de Navegación</span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
          </button>
          <a class="navbar-brand" href="https://www.gob.mx/">
            <img src="https://framework-gb.cdn.gob.mx/landing/img/logoheader.svg" width="128" height="48" alt="Página de inicio, Gobierno de México">
          </a>
        </div>
        <div class="collapse navbar-collapse" id="navbarMainCollapse">
          <ul class="nav navbar-nav navbar-right">
            <li><a href="https://www.gob.mx/tramites">Trámites</a></li>
            <li><a href="https://www.gob.mx/gobierno">Gobierno</a></li>
            <li><a href="https://www.gob.mx/busqueda"><span class="sr-only">Búsqueda</span><i class="icon-search"></i></a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main>
    
    <div class="barra-vino">
        <div class="container">
            <h1 class="titulo-barra">Registro Nacional de Profesionistas</h1>
            <div class="search-box-vino">
                <input type="text" placeholder="Buscar cédula...">
                <button type="button">Buscar</button>
            </div>
        </div>
    </div>

    <div class="container portada-container">
        <div class="row">
            <div class="col-md-12">
                <img src="logo.png" alt="Portada Registro Nacional de Profesionistas" class="portada-img">
            </div>
        </div>
    </div>

    <div class="container" style="min-height: 300px;">
        <div class="row">
            <div class="col-md-12">
                <h3>Búsqueda de Cédulas</h3>
                <p>Aquí irá el formulario de búsqueda en el siguiente paso.</p>
            </div>
        </div>
    </div>

  </main>


  <footer class="main-footer">
    <div class="container-fluid footer-plege">
      <div class="container">
        <div class="row">
          <div class="col-sm-12">
            <br>
            <br>
          </div>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://framework-gb.cdn.gob.mx/gobmx.js"></script>

</body>
</html>
